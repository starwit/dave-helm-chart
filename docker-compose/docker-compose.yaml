name: dave-stack

services:
  postgres-dave:
    container_name: postgres
    image: postgres:18
    environment:
      - POSTGRES_DB=dave-db
      - POSTGRES_USER=dave
      - POSTGRES_PASSWORD=1234
    volumes:
      - pg_data:/var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    healthcheck: &healthcheck
      test: [ "CMD-SHELL", "pg_isready -d postgres -U dave" ]
      interval: 30s
      timeout: 60s
      retries: 3
      start_period: 60s
    security_opt: &security_settings
      - no-new-privileges:true

  # see https://event-driven.io/en/automatically_connect_pgadmin_to_database/
  pg-admin:
    container_name: pg-admin
    image: dpage/pgadmin4:9.12
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
      - PGADMIN_LISTEN_PORT=5050
    ports:
      - "5050:5050"
    depends_on:
      - postgres-dave
    healthcheck:
      <<: *healthcheck
      test: [ "CMD", "wget", "-O", "-", "http://localhost:5050/misc/ping" ]
    security_opt: *security_settings
    volumes:
      - './pgadmin/servers.json:/pgadmin4/servers.json:ro'
      - './pgadmin/pgpass:/pgadmin4/pgpass'
    user: root # see https://github.com/pgadmin-org/pgadmin4/issues/6257
    entrypoint: /bin/sh -c "chmod 600 /pgadmin4/pgpass; /entrypoint.sh;" # see https://www.postgresql.org/docs/current/libpq-pgpass.html#LIBPQ-PGPASS (last paragraph)

  dave-backend:
    container_name: dave-backend
    image: starwitorg/dave-backend:5.1.0
    environment:
      DB_SCHEMA: public
      APP_SCAN_PACKAGES: org.springframework.data.jpa.convert.threeten,de.muenchen.dave,de.muenchen.relationalimpl
      SPRING_PROFILES_ACTIVE: local, no-security
      SPRING_AUTOCONFIGURE_EXCLUDE: org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
            
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-dave:5432/dave-db
      SPRING_DATASOURCE_USERNAME: dave
      SPRING_DATASOURCE_PASSWORD: 1234

      SPRING_JPA_SHOW_SQL: false
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 10MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 10MB

      DAVE_ZAEHLUNG_STATUS_UPDATER: 0 0 * 1/1 * ?
      DAVE_EMAIL_SENDER_HOSTNAME: localhost
      DAVE_EMAIL_ADDRESS: test@example.com
      DAVE_EMAIL_PASSWORD: password
      DAVE_EMAIL_URL_ADMINPORTAL: http://localhost:8085
      DAVE_EMAIL_URL_SELFSERVICEPORTAL: http://localhost:8086
      DAVE_EMAIL_RECEIVER_UPDATE_INTERVAL: 50000000000
      DAVE_EMAIL_RECEIVER_HOSTNAME: imap.de
      DAVE_MESSSTELLE_CRON: 0 0 * 1/1 * ?
      DAVE_MESSSTELLE_SHEDLOCK: 4m
      DAVE_REPORTS_LOGO_ICON: classpath:/pdf/images/kindl.jpg
      DAVE_REPORTS_LOGO_SUBTITLE: Landeshauptstadt<br/>München<br/><b>Mobilitätsreferat</b>
      
      ELASTICSEARCH_HOST: localhost
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_USER: elastic
      ELASTICSEARCH_PASSWORD: changeme
      ELASTICSEARCH_HTTP_CA_CERTIFICATE: ""
      ELASTICSEARCH_CONNECTTIMEOUT: 10
      ELASTICSEARCH_SOCKETTIMEOUT: 30

      SPRING_FLYWAY_LOCATIONS: classpath:db/migration, classpath:data2
      SPRING_JPA_HIBERNATE_NAMING_PHYSICAL_STRATEGY: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

      TZ: Europe/Berlin
    ports:
      - "8080:8080"
    depends_on:
      postgres-dave:
        condition: service_healthy
    pull_policy: if_not_present
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "curl http://dave-backend:8080/actuator/health | grep -q '\"status\":\"UP\"'", ]
      interval: 1s
      timeout: 5s
      retries: 120

  dave-frontend:
    container_name: dave-frontend
    image: starwitorg/dave-frontend:5.1.0
    environment:
      SPRING_PROFILES_ACTIVE: local, no-security
      SPRING_CLOUD_GATEWAY_ROUTES_0_ID: backend
      SPRING_CLOUD_GATEWAY_ROUTES_0_URI: http://dave-backend:8080/
      SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0: Path=/api/dave-backend-service/**
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_0_NAME: Retry
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_0_ARGS_RETRIES: "2"
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_0_ARGS_METHODS: GET,POST
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_0_ARGS_BACKOFF_FIRSTBACKOFF: 10ms
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_0_ARGS_BACKOFF_MAXBACKOFF: 50ms
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_0_ARGS_BACKOFF_FACTOR: "2"
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_0_ARGS_BACKOFF_BASEDONPREVIOUSVALUE: "false"
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_1_NAME: RewritePath
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_1_ARGS_REGEXP: /api/dave-backend-service/(?<urlsegments>.*)
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_1_ARGS_REPLACEMENT: /$\{urlsegments}
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_2_NAME: RemoveResponseHeader
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_2_ARGS_NAME: WWW-Authenticate
    ports:
      - "8082:8082"
    depends_on:
      dave-backend:
        condition: service_healthy
    pull_policy: if_not_present
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://dave-frontend:8082/actuator/health || exit 1" ]
      interval: 1s
      timeout: 5s
      retries: 120

volumes:
  pg_data: